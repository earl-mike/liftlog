<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftLog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #c8ff00;
    --accent2: #ff6b35;
    --blue: #4fc3f7;
    --text: #f0f0f0;
    --muted: #555555;
    --muted2: #888888;
    --push: #ff6b35;
    --pull: #4fc3f7;
    --lower: #c8ff00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .cycle-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted2);
  }

  .cycle-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .cycle-nav button:hover { border-color: var(--accent); color: var(--accent); }

  .sync-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .sync-dot.syncing { background: var(--accent2); animation: pulse 0.8s infinite; }
  .sync-dot.synced { background: var(--accent); }
  .sync-dot.error { background: var(--accent2); }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 8px 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); border-color: var(--muted); }
  .tab.active { color: #000; font-weight: 500; }
  .tab.push { border-color: var(--push); }
  .tab.push.active { background: var(--push); border-color: var(--push); }
  .tab.pull { border-color: var(--pull); }
  .tab.pull.active { background: var(--pull); border-color: var(--pull); }
  .tab.lower { border-color: var(--lower); }
  .tab.lower.active { background: var(--lower); border-color: var(--lower); }
  .tab.recap { border-color: var(--muted); }
  .tab.recap.active { background: var(--muted2); border-color: var(--muted2); }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    margin-bottom: 4px;
    color: var(--muted2);
  }

  .day-header span { color: var(--text); }

  .day-subheader {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .tier-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .tier-sp { background: #ff6b3522; color: var(--accent2); border: 1px solid var(--accent2); }
  .tier-s { background: #c8ff0015; color: var(--accent); border: 1px solid #c8ff0044; }
  .tier-a { background: #4fc3f715; color: var(--blue); border: 1px solid #4fc3f744; }

  .exercise-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }

  .exercise-row {
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.15s;
    padding: 10px 14px;
  }

  .exercise-row.logged { border-color: var(--accent); }
  .exercise-row.bonus { border-color: var(--blue); border-style: dashed; }
  .exercise-row.bonus.logged { border-color: var(--accent); border-style: solid; }

  .exercise-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }

  .exercise-name-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }

  .exercise-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .exercise-name.custom { color: var(--accent); }
  .exercise-name.bonus-name { color: var(--blue); }

  .edit-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: color 0.15s;
    line-height: 1;
  }

  .edit-btn:hover { color: var(--accent); }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: color 0.15s;
    line-height: 1;
  }

  .delete-btn:hover { color: var(--accent2); }

  .name-edit-input {
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 3px 8px;
    flex: 1;
    min-width: 0;
    display: none;
  }

  .name-edit-input:focus { outline: none; }

  .name-confirm-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    flex-shrink: 0;
    display: none;
  }

  .exercise-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    flex-shrink: 0;
  }

  .sets-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .set-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
  }

  .set-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    width: 100%;
    padding: 6px 4px;
    text-align: center;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .set-input::-webkit-outer-spin-button,
  .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input.has-value { border-color: var(--accent); color: var(--accent); }

  .unit {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    margin-bottom: 6px;
  }

  .progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; }

  .logged-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    margin-bottom: 10px;
  }

  .add-exercise-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--muted);
    color: var(--muted2);
    padding: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 14px;
  }

  .add-exercise-btn:hover { border-color: var(--blue); color: var(--blue); }

  .notes-area {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    padding: 12px;
    resize: vertical;
    min-height: 70px;
    margin-bottom: 12px;
  }

  .notes-area:focus { outline: none; border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); }

  .autosave-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .btn {
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted2);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-copy {
    background: var(--blue);
    color: #000;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-copy:hover { opacity: 0.85; }

  .flash-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .flash-msg.show { opacity: 1; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .recap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .recap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
  }

  .recap-card.bonus-card { border-color: var(--blue); }

  .recap-card .day-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .recap-card .ex-name {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .recap-sets { display: flex; gap: 4px; flex-wrap: wrap; }

  .recap-set {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    line-height: 1;
  }

  .recap-set .rs-unit {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted2);
  }

  .recap-set.empty { color: var(--muted); font-size: 14px; }

  .export-box {
    background: var(--surface);
    border: 1px solid var(--blue);
    border-left: 3px solid var(--blue);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .export-box-text { font-size: 13px; color: var(--muted2); line-height: 1.5; }
  .export-box-text strong { color: var(--blue); font-weight: 500; }

  .ai-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 20px;
    margin-bottom: 16px;
  }

  .ai-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .ai-content { font-size: 13px; line-height: 1.75; color: var(--muted2); }
  .ai-content p { margin-bottom: 10px; }
  .ai-content p:last-child { margin-bottom: 0; }
  .ai-content strong { color: var(--text); font-weight: 500; }

  .recap-section { margin-bottom: 28px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
  }

  .load-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .dot-loader { display: inline-flex; gap: 5px; align-items: center; }

  .dot-loader span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
  .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%,80%,100%{opacity:0.2}40%{opacity:1} }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="load-logo">LIFT<span style="color:#f0f0f0">LOG</span></div>
  <div class="dot-loader"><span></span><span></span><span></span></div>
  <div style="font-family:'DM Mono',monospace;font-size:11px;color:#555;letter-spacing:1px;margin-top:4px;">SYNCING DATA...</div>
</div>

<header>
  <div class="logo">LIFT<span>LOG</span></div>
  <div class="header-right">
    <div class="cycle-nav">
      <button onclick="changeCycle(-1)">&#8249;</button>
      <span id="cycleLabel">CYCLE 1</span>
      <button onclick="changeCycle(1)">&#8250;</button>
    </div>
    <div class="sync-row">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">LOADING</span>
    </div>
  </div>
</header>

<div class="tabs" id="tabBar"></div>
<div id="panels"></div>

<script>
const API_KEY = '$2a$10$QR7R9tSqbovZw0xKejAUp.T.cXbKEAQTtpEl.pVh9GFMiN3G1at2y';
const BIN_ID = '69cc5e04aaba882197b1af4d';
const NUM_SETS = 4;

let cloudData = { cycles: {}, nameOverrides: {} };
let saveTimer = null;

const PROGRAM = [
  {
    id:'push1', label:"PUSH1", sub:"CHEST PRIMARY", type:'push',
    exercises:[
      {name:"Barbell Bench Press", tier:"S+", reps:"6–8"},
      {name:"Incline Dumbbell Press", tier:"S", reps:"8–10"},
      {name:"Machine Chest Press", tier:"S", reps:"10–12"},
      {name:"Bottom Up Cable Fly", tier:"A", reps:"12–15"},
      {name:"Machine Shoulder Press", tier:"S", reps:"8–10"},
      {name:"Cable Lateral Raise", tier:"S", reps:"15–20"},
      {name:"EZ-Bar Skullcrusher", tier:"S", reps:"10–12"},
      {name:"Rope Pushdown", tier:"A", reps:"15–20"},
    ]
  },
  {
    id:'pull1', label:"PULL1", sub:"THICKNESS + BICEPS", type:'pull',
    exercises:[
      {name:"Chest Supported Row", tier:"S+", reps:"8–10"},
      {name:"Single Arm Cable Row", tier:"S", reps:"10–12"},
      {name:"Neutral Grip Lat Pulldown", tier:"S", reps:"10–12"},
      {name:"Bayesian Cable Curl", tier:"S+", reps:"10–12"},
      {name:"Preacher Curl", tier:"S", reps:"10–12"},
      {name:"Face Pull", tier:"S", reps:"15–20"},
      {name:"Reverse Pec Deck Cable", tier:"S", reps:"15–20"},
    ]
  },
  {
    id:'lower1', label:"LOWER1", sub:"QUAD FOCUS", type:'lower',
    exercises:[
      {name:"Front Squat", tier:"S+", reps:"5–8"},
      {name:"Leg Press (high foot)", tier:"S", reps:"10–12"},
      {name:"Leg Extension (controlled)", tier:"S", reps:"15–20"},
      {name:"Romanian Deadlift", tier:"S", reps:"8–10"},
      {name:"Seated Leg Curl", tier:"A", reps:"10–12"},
      {name:"Standing Calf Raise", tier:"A", reps:"12–15"},
    ]
  },
  {
    id:'push2', label:"PUSH2", sub:"SHOULDER PRIMARY", type:'push',
    exercises:[
      {name:"Incline Barbell Press", tier:"S+", reps:"6–8"},
      {name:"Cable Pec Fly", tier:"S", reps:"12–15"},
      {name:"Dumbbell Shoulder Press", tier:"S", reps:"8–10"},
      {name:"Lean Away Lateral Raise", tier:"S+", reps:"15–20"},
      {name:"Cable Lateral Raise", tier:"S", reps:"15–20"},
      {name:"Overhead Cable Tri Ext", tier:"S", reps:"12–15"},
      {name:"Rope Pushdown", tier:"A", reps:"15–20"},
    ]
  },
  {
    id:'pull2', label:"PULL2", sub:"WIDTH + REAR DELTS", type:'pull',
    exercises:[
      {name:"Single Arm Lat Pulldown", tier:"S", reps:"10–12"},
      {name:"Chest Supported Row", tier:"S+", reps:"8–10"},
      {name:"Banded Pull Ups", tier:"A", reps:"8–10"},
      {name:"Hammer Curl", tier:"S", reps:"12–15"},
      {name:"Rear Delt Cable Fly", tier:"S+", reps:"15–20"},
      {name:"Face Pull", tier:"S+", reps:"15–20"},
      {name:"Cable Y Raise", tier:"A", reps:"15–20"},
    ]
  },
  {
    id:'lower2', label:"LOWER2", sub:"GLUTE PRIMARY", type:'lower',
    exercises:[
      {name:"Hip Thrust", tier:"S+", reps:"10–12"},
      {name:"Bulgarian Split Squat", tier:"S", reps:"10–12"},
      {name:"Hack Squat", tier:"S", reps:"8–10"},
      {name:"Romanian Deadlift", tier:"S", reps:"8–10"},
      {name:"Leg Extension (controlled)", tier:"A", reps:"15–20"},
      {name:"Seated Leg Curl", tier:"A", reps:"10–12"},
    ]
  },
  {id:'recap', label:"RECAP", sub:"", type:'recap', exercises:[]}
];

let currentCycle = 1;

function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

async function loadFromCloud() {
  setSyncStatus('syncing', 'LOADING...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    const data = await res.json();
    cloudData = data.record || { cycles: {}, nameOverrides: {} };
    if (!cloudData.cycles) cloudData.cycles = {};
    if (!cloudData.nameOverrides) cloudData.nameOverrides = {};
    setSyncStatus('synced', 'SYNCED');
  } catch(e) {
    setSyncStatus('error', 'OFFLINE');
    cloudData = JSON.parse(localStorage.getItem('ll_backup') || '{"cycles":{},"nameOverrides":{}}');
  }
  document.getElementById('loadingOverlay').style.display = 'none';
  renderAll();
}

async function saveToCloud() {
  setSyncStatus('syncing', 'SAVING...');
  localStorage.setItem('ll_backup', JSON.stringify(cloudData));
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(cloudData)
    });
    setSyncStatus('synced', 'SAVED ✓');
  } catch(e) {
    setSyncStatus('error', 'SAVE FAILED');
  }
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToCloud, 1500);
}

function ensureDay(c, d) {
  if (!cloudData.cycles[`c${c}`]) cloudData.cycles[`c${c}`] = {};
  if (!cloudData.cycles[`c${c}`][d]) cloudData.cycles[`c${c}`][d] = {};
}

function getSet(c, d, e, s) {
  const sets = cloudData?.cycles?.[`c${c}`]?.[d]?.[`e${e}`];
  if (Array.isArray(sets)) return sets[s] || '';
  if (s === 0 && sets && typeof sets === 'string') return sets;
  return '';
}

function setSet(c, d, e, s, v) {
  ensureDay(c, d);
  const key = `e${e}`;
  let arr = cloudData.cycles[`c${c}`][d][key];
  if (!Array.isArray(arr)) { arr = ['','','','']; }
  arr[s] = v;
  cloudData.cycles[`c${c}`][d][key] = arr;
  debouncedSave();
}

// Permanent name overrides — stored globally, not per cycle
function getExName(dayId, ei) {
  return cloudData?.nameOverrides?.[`${dayId}_${ei}`] || null;
}

function setExName(dayId, ei, name) {
  if (!cloudData.nameOverrides) cloudData.nameOverrides = {};
  if (name) {
    cloudData.nameOverrides[`${dayId}_${ei}`] = name;
  } else {
    delete cloudData.nameOverrides[`${dayId}_${ei}`];
  }
  debouncedSave();
}

function getBonusExercises(c, d) {
  return cloudData?.cycles?.[`c${c}`]?.[d]?.bonus || [];
}

function saveBonusExercises(c, d, arr) {
  ensureDay(c, d);
  cloudData.cycles[`c${c}`][d].bonus = arr;
  debouncedSave();
}

function getNotes(c, d) { return cloudData?.cycles?.[`c${c}`]?.[d]?.notes || ''; }
function setNotes(c, d, v) {
  ensureDay(c, d);
  cloudData.cycles[`c${c}`][d].notes = v;
  debouncedSave();
}

function getAI(c) { return cloudData?.cycles?.[`c${c}`]?.ai || ''; }
function setAI(c, v) {
  if (!cloudData.cycles[`c${c}`]) cloudData.cycles[`c${c}`] = {};
  cloudData.cycles[`c${c}`].ai = v;
  debouncedSave();
}

function changeCycle(dir) {
  const n = currentCycle + dir;
  if (n < 1) return;
  currentCycle = n;
  document.getElementById('cycleLabel').textContent = `CYCLE ${currentCycle}`;
  renderAll();
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function startEditName(di, ei, dayId) {
  const nameEl = document.getElementById(`exname_${di}_${ei}`);
  const inputEl = document.getElementById(`exinput_${di}_${ei}`);
  const confirmEl = document.getElementById(`exconfirm_${di}_${ei}`);
  const editBtn = document.getElementById(`exedit_${di}_${ei}`);
  inputEl.value = nameEl.textContent;
  nameEl.style.display = 'none';
  editBtn.style.display = 'none';
  inputEl.style.display = 'block';
  confirmEl.style.display = 'block';
  inputEl.focus(); inputEl.select();
}

function confirmEditName(di, ei, dayId) {
  const nameEl = document.getElementById(`exname_${di}_${ei}`);
  const inputEl = document.getElementById(`exinput_${di}_${ei}`);
  const confirmEl = document.getElementById(`exconfirm_${di}_${ei}`);
  const editBtn = document.getElementById(`exedit_${di}_${ei}`);
  const newName = inputEl.value.trim();
  const defaultName = PROGRAM.find(d=>d.id===dayId).exercises[ei].name;
  if (newName && newName !== defaultName) {
    nameEl.textContent = newName;
    nameEl.classList.add('custom');
    setExName(dayId, ei, newName);
  } else {
    nameEl.textContent = defaultName;
    nameEl.classList.remove('custom');
    setExName(dayId, ei, null);
  }
  nameEl.style.display = 'block';
  editBtn.style.display = 'block';
  inputEl.style.display = 'none';
  confirmEl.style.display = 'none';
}

function addBonusExercise(dayId, di) {
  const bonus = getBonusExercises(currentCycle, dayId);
  bonus.push({ name: 'New Exercise', sets: ['','','',''] });
  saveBonusExercises(currentCycle, dayId, bonus);
  renderAll();
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===di));
  document.querySelectorAll('.day-panel').forEach((p,i) => p.classList.toggle('active', i===di));
  const bi = bonus.length - 1;
  const inp = document.getElementById(`bonus_name_${di}_${bi}`);
  if (inp) { inp.style.display = 'block'; inp.focus(); inp.select(); }
  const nameEl = document.getElementById(`bonus_exname_${di}_${bi}`);
  if (nameEl) nameEl.style.display = 'none';
  const confirmEl = document.getElementById(`bonus_confirm_${di}_${bi}`);
  if (confirmEl) confirmEl.style.display = 'block';
  const editBtn = document.getElementById(`bonus_edit_${di}_${bi}`);
  if (editBtn) editBtn.style.display = 'none';
}

function startEditBonusName(di, bi, dayId) {
  const nameEl = document.getElementById(`bonus_exname_${di}_${bi}`);
  const inputEl = document.getElementById(`bonus_name_${di}_${bi}`);
  const confirmEl = document.getElementById(`bonus_confirm_${di}_${bi}`);
  const editBtn = document.getElementById(`bonus_edit_${di}_${bi}`);
  inputEl.value = nameEl.textContent;
  nameEl.style.display = 'none'; editBtn.style.display = 'none';
  inputEl.style.display = 'block'; confirmEl.style.display = 'block';
  inputEl.focus(); inputEl.select();
}

function confirmBonusName(di, bi, dayId) {
  const nameEl = document.getElementById(`bonus_exname_${di}_${bi}`);
  const inputEl = document.getElementById(`bonus_name_${di}_${bi}`);
  const confirmEl = document.getElementById(`bonus_confirm_${di}_${bi}`);
  const editBtn = document.getElementById(`bonus_edit_${di}_${bi}`);
  const newName = inputEl.value.trim() || 'New Exercise';
  nameEl.textContent = newName;
  nameEl.style.display = 'block'; editBtn.style.display = 'block';
  inputEl.style.display = 'none'; confirmEl.style.display = 'none';
  const bonus = getBonusExercises(currentCycle, dayId);
  if (bonus[bi]) { bonus[bi].name = newName; saveBonusExercises(currentCycle, dayId, bonus); }
}

function deleteBonusExercise(dayId, bi) {
  const bonus = getBonusExercises(currentCycle, dayId);
  bonus.splice(bi, 1);
  saveBonusExercises(currentCycle, dayId, bonus);
  renderAll();
}

function renderAll() {
  document.getElementById('tabBar').innerHTML = PROGRAM.map((d,i) =>
    `<button class="tab ${d.type}${i===0?' active':''}" onclick="switchTab(${i})">${d.label}</button>`
  ).join('');

  const container = document.getElementById('panels');
  container.innerHTML = '';
  PROGRAM.forEach((day, di) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (di===0?' active':'');
    panel.innerHTML = day.type==='recap' ? buildRecap() : buildDay(day, di);
    container.appendChild(panel);
  });

  PROGRAM.forEach((day, di) => {
    if (day.type==='recap') return;

    day.exercises.forEach((ex, ei) => {
      const customName = getExName(day.id, ei);
      const nameEl = document.getElementById(`exname_${di}_${ei}`);
      if (nameEl && customName) { nameEl.textContent = customName; nameEl.classList.add('custom'); }

      const inputEl = document.getElementById(`exinput_${di}_${ei}`);
      if (inputEl) inputEl.addEventListener('keydown', e => { if(e.key==='Enter') confirmEditName(di,ei,day.id); });

      for (let s = 0; s < NUM_SETS; s++) {
        const inp = document.getElementById(`inp_${di}_${ei}_${s}`);
        if (!inp) continue;
        const val = getSet(currentCycle, day.id, ei, s);
        inp.value = val;
        if (val) inp.classList.add('has-value');
        inp.addEventListener('input', () => {
          setSet(currentCycle, day.id, ei, s, inp.value);
          inp.classList.toggle('has-value', !!inp.value);
          updateProgress(di);
        });
      }
    });

    const bonus = getBonusExercises(currentCycle, day.id);
    bonus.forEach((bex, bi) => {
      const nameInp = document.getElementById(`bonus_name_${di}_${bi}`);
      if (nameInp) nameInp.addEventListener('keydown', e => { if(e.key==='Enter') confirmBonusName(di,bi,day.id); });
      for (let s = 0; s < NUM_SETS; s++) {
        const inp = document.getElementById(`binp_${di}_${bi}_${s}`);
        if (!inp) continue;
        inp.value = bex.sets[s] || '';
        if (inp.value) inp.classList.add('has-value');
        inp.addEventListener('input', () => {
          const b = getBonusExercises(currentCycle, day.id);
          if (!b[bi]) return;
          b[bi].sets[s] = inp.value;
          saveBonusExercises(currentCycle, day.id, b);
          inp.classList.toggle('has-value', !!inp.value);
          updateProgress(di);
        });
      }
    });

    const notes = document.getElementById(`notes_${di}`);
    if (notes) {
      notes.value = getNotes(currentCycle, day.id);
      notes.addEventListener('input', () => setNotes(currentCycle, day.id, notes.value));
    }
    updateProgress(di);
  });
}

function tierBadge(tier) {
  return `<span class="tier-badge tier-${tier.toLowerCase().replace('+','sp')}">${tier}</span>`;
}

function buildDay(day, di) {
  const rows = day.exercises.map((ex, ei) => {
    const setBoxes = Array.from({length: NUM_SETS}, (_, s) => `
      <div class="set-wrap">
        <div class="set-label">S${s+1}</div>
        <input type="number" class="set-input" id="inp_${di}_${ei}_${s}" placeholder="—" min="0" step="2.5">
      </div>`).join('');
    return `
      <div class="exercise-row">
        <div class="exercise-top">
          <div class="exercise-name-wrap">
            ${tierBadge(ex.tier)}
            <span class="exercise-name" id="exname_${di}_${ei}">${ex.name}</span>
            <button class="edit-btn" id="exedit_${di}_${ei}" onclick="startEditName(${di},${ei},'${day.id}')" title="Rename permanently">✎</button>
            <input class="name-edit-input" id="exinput_${di}_${ei}" type="text" maxlength="40">
            <button class="name-confirm-btn" id="exconfirm_${di}_${ei}" onclick="confirmEditName(${di},${ei},'${day.id}')">✓</button>
          </div>
          <div class="exercise-meta">${ex.reps}</div>
        </div>
        <div class="sets-row">${setBoxes}<div class="unit">lbs</div></div>
      </div>`;
  }).join('');

  const bonus = getBonusExercises(currentCycle, day.id);
  const bonusRows = bonus.map((bex, bi) => {
    const setBoxes = Array.from({length: NUM_SETS}, (_, s) => `
      <div class="set-wrap">
        <div class="set-label">S${s+1}</div>
        <input type="number" class="set-input" id="binp_${di}_${bi}_${s}" placeholder="—" min="0" step="2.5">
      </div>`).join('');
    return `
      <div class="exercise-row bonus">
        <div class="exercise-top">
          <div class="exercise-name-wrap">
            <span class="tier-badge tier-a">+</span>
            <span class="exercise-name bonus-name" id="bonus_exname_${di}_${bi}">${bex.name}</span>
            <button class="edit-btn" id="bonus_edit_${di}_${bi}" onclick="startEditBonusName(${di},${bi},'${day.id}')">✎</button>
            <input class="name-edit-input" id="bonus_name_${di}_${bi}" type="text" maxlength="40" placeholder="Exercise name">
            <button class="name-confirm-btn" id="bonus_confirm_${di}_${bi}" onclick="confirmBonusName(${di},${bi},'${day.id}')">✓</button>
          </div>
          <button class="delete-btn" onclick="deleteBonusExercise('${day.id}',${bi})">✕</button>
        </div>
        <div class="sets-row">${setBoxes}<div class="unit">lbs</div></div>
      </div>`;
  }).join('');

  return `
    <div class="day-header"><span>${day.label}</span></div>
    <div class="day-subheader">${day.sub}</div>
    <div class="exercise-grid">${rows}${bonusRows}</div>
    <button class="add-exercise-btn" onclick="addBonusExercise('${day.id}', ${di})">+ Add Exercise</button>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog_${di}" style="width:0%"></div></div>
    <div class="logged-count" id="cnt_${di}">0 / ${day.exercises.length} logged</div>
    <textarea class="notes-area" id="notes_${di}" placeholder="Session notes — PRs, swaps, how it felt..."></textarea>
    <div class="autosave-note">◈ AUTO-SAVES TO CLOUD AS YOU TYPE</div>`;
}

function buildRecap() {
  const savedAI = getAI(currentCycle);
  const cards = PROGRAM.filter(d=>d.type!=='recap').map(day => {
    const regularCards = day.exercises.map((ex, ei) => {
      const customName = getExName(day.id, ei);
      const displayName = customName || ex.name;
      const sets = Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle,day.id,ei,s));
      const hasAny = sets.some(v=>v);
      const setDisplay = sets.map(v => v
        ? `<div class="recap-set">${v}<span class="rs-unit">lb</span></div>`
        : `<div class="recap-set empty">·</div>`
      ).join('');
      return `<div class="recap-card" style="${!hasAny?'opacity:0.35':''}">
        <div class="day-label">${day.label}</div>
        <div class="ex-name">${displayName}</div>
        <div class="recap-sets">${setDisplay}</div>
      </div>`;
    }).join('');

    const bonus = getBonusExercises(currentCycle, day.id);
    const bonusCards = bonus.map(bex => {
      const hasAny = bex.sets.some(v=>v);
      const setDisplay = bex.sets.map(v => v
        ? `<div class="recap-set">${v}<span class="rs-unit">lb</span></div>`
        : `<div class="recap-set empty">·</div>`
      ).join('');
      return `<div class="recap-card bonus-card" style="${!hasAny?'opacity:0.35':''}">
        <div class="day-label">${day.label} · BONUS</div>
        <div class="ex-name">${bex.name}</div>
        <div class="recap-sets">${setDisplay}</div>
      </div>`;
    }).join('');

    return regularCards + bonusCards;
  }).join('');

  const aiHtml = savedAI
    ? `<div class="ai-box"><div class="ai-label">◈ AI Coach — Cycle ${currentCycle}</div><div class="ai-content" id="aiContent">${savedAI}</div></div>`
    : `<div class="ai-box"><div class="ai-label">◈ AI Coach</div><div class="ai-content" id="aiContent"><p style="color:var(--muted)">Hit Generate to get coaching notes on this cycle.</p></div></div>`;

  return `
    <div class="day-header"><span>CYCLE ${currentCycle} RECAP</span></div>
    <div class="day-subheader">PUSH 1 · PULL 1 · LOWER 1 · REST · PUSH 2 · PULL 2 · LOWER 2 · REST</div>
    <div class="recap-section">
      <div class="section-label">Logged Weights</div>
      <div class="recap-grid">${cards}</div>
    </div>
    <div class="recap-section">
      <div class="export-box">
        <div class="export-box-text"><strong>↑ Share with Claude</strong><br>Copy your cycle and paste into Claude for your check-in.</div>
        <button class="btn btn-copy" onclick="exportCycle()">⬆ Copy for Claude</button>
      </div>
      <span class="flash-msg" id="exportFlash" style="display:block;margin-bottom:12px;">✓ Copied! Paste into Claude.</span>
    </div>
    <div class="recap-section">
      <div class="section-label">AI Coaching Analysis</div>
      ${aiHtml}
      <div class="btn-row" style="margin-top:14px;">
        <button class="btn btn-outline" id="genBtn" onclick="generateRecap()">Generate Cycle ${currentCycle} Recap</button>
      </div>
    </div>`;
}

function updateProgress(di) {
  const day = PROGRAM[di];
  if (!day || day.type==='recap') return;
  let n = 0;
  day.exercises.forEach((_,ei) => {
    for (let s = 0; s < NUM_SETS; s++) {
      if (getSet(currentCycle, day.id, ei, s)) { n++; break; }
    }
  });
  const pct = Math.round(n / day.exercises.length * 100);
  const bar = document.getElementById(`prog_${di}`);
  const cnt = document.getElementById(`cnt_${di}`);
  if(bar) bar.style.width = pct+'%';
  if(cnt) cnt.textContent = `${n} / ${day.exercises.length} logged`;
}

function exportCycle() {
  let text = `LIFTLOG — CYCLE ${currentCycle} DATA\n${'='.repeat(36)}\n\n`;
  PROGRAM.filter(d=>d.type!=='recap').forEach(day=>{
    const notes = getNotes(currentCycle, day.id);
    let hasData = day.exercises.some((_,ei)=>
      Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle,day.id,ei,s)).some(v=>v)
    );
    const bonus = getBonusExercises(currentCycle, day.id);
    const hasBonus = bonus.some(b=>b.sets.some(v=>v));
    if (!hasData && !hasBonus && !notes) return;

    text += `${day.label} — ${day.sub}\n`;
    day.exercises.forEach((ex,ei)=>{
      const customName = getExName(day.id, ei);
      const displayName = customName ? `${customName} (sub for ${ex.name})` : ex.name;
      const sets = Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle,day.id,ei,s));
      if (!sets.some(v=>v)) return;
      const setStr = sets.map((v,s)=>v?`S${s+1}:${v}lbs`:'').filter(Boolean).join(' | ');
      text += `  ${displayName} (${ex.reps}): ${setStr}\n`;
    });
    bonus.forEach(bex=>{
      if (!bex.sets.some(v=>v)) return;
      const setStr = bex.sets.map((v,s)=>v?`S${s+1}:${v}lbs`:'').filter(Boolean).join(' | ');
      text += `  ${bex.name} [BONUS]: ${setStr}\n`;
    });
    if (notes) text += `  Notes: ${notes}\n`;
    text += '\n';
  });

  if (currentCycle > 1) {
    text += `CYCLE ${currentCycle-1} COMPARISON\n`;
    let hasComp = false;
    PROGRAM.filter(d=>d.type!=='recap').forEach(day=>{
      day.exercises.forEach((ex,ei)=>{
        const currSets = Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle,day.id,ei,s)).filter(Boolean);
        const prevSets = Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle-1,day.id,ei,s)).filter(Boolean);
        if (currSets.length && prevSets.length) {
          const currMax = Math.max(...currSets.map(Number));
          const prevMax = Math.max(...prevSets.map(Number));
          const diff = currMax - prevMax;
          text += `  ${ex.name}: ${prevMax} → ${currMax} lbs top set (${diff>=0?'+':''}${diff})\n`;
          hasComp = true;
        }
      });
    });
    if (!hasComp) text += '  (no previous cycle data)\n';
    text += '\n';
  }

  text += `Goals: Lean bulk. Focus: chest, shoulder width, rear delts, bicep size, quad rebuild.\nPaste into Claude and say "cycle check-in".`;

  navigator.clipboard.writeText(text).then(()=>{
    const el = document.getElementById('exportFlash');
    if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
  }).catch(()=>{ prompt('Copy this:', text); });
}

async function generateRecap() {
  const btn = document.getElementById('genBtn');
  const content = document.getElementById('aiContent');
  btn.disabled = true;
  btn.innerHTML = '<span class="dot-loader"><span></span><span></span><span></span></span>';

  let prompt = `You are an expert strength and hypertrophy coach. Analyze this training cycle log.\n\nGoals: Lean bulk. Focus: chest, shoulder width, rear delts, bicep size, quad rebuild. Note: right knee tendon recovering — ramp lower body slowly.\n\nCycle ${currentCycle}:\n\n`;

  PROGRAM.filter(d=>d.type!=='recap').forEach(day=>{
    prompt += `${day.label} (${day.sub}):\n`;
    day.exercises.forEach((ex,ei)=>{
      const customName = getExName(day.id, ei);
      const displayName = customName ? `${customName} (sub for ${ex.name})` : ex.name;
      const sets = Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle,day.id,ei,s));
      if (!sets.some(v=>v)) return;
      const setStr = sets.map((v,s)=>v?`S${s+1}:${v}lbs`:'').filter(Boolean).join(', ');
      prompt += `  ${displayName} [${ex.tier}] (${ex.reps}): ${setStr}\n`;
    });
    const bonus = getBonusExercises(currentCycle, day.id);
    bonus.forEach(bex=>{
      if (!bex.sets.some(v=>v)) return;
      const setStr = bex.sets.map((v,s)=>v?`S${s+1}:${v}lbs`:'').filter(Boolean).join(', ');
      prompt += `  ${bex.name} [BONUS]: ${setStr}\n`;
    });
    const n = getNotes(currentCycle, day.id);
    if(n) prompt += `  Notes: ${n}\n`;
    prompt += '\n';
  });

  if (currentCycle > 1) {
    prompt += `\nPrev Cycle (${currentCycle-1}) top sets:\n`;
    PROGRAM.filter(d=>d.type!=='recap').forEach(day=>{
      day.exercises.forEach((ex,ei)=>{
        const sets = Array.from({length:NUM_SETS},(_,s)=>getSet(currentCycle-1,day.id,ei,s)).filter(Boolean);
        if (sets.length) {
          prompt += `  ${ex.name}: ${Math.max(...sets.map(Number))}lbs top set\n`;
        }
      });
    });
  }

  prompt += `\nProvide:\n1. **Overview** — 2 sentences on how the cycle went\n2. **Wins** — 2-3 specific callouts with actual sets/weights\n3. **Next Cycle Targets** — specific weight suggestions for key lifts\n4. **Watch Points** — 1-2 adjustments including knee/quad considerations\n\nBe direct. HTML <p> and <strong> tags only.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'Could not generate.';
    content.innerHTML = text;
    setAI(currentCycle, text);
  } catch(e) {
    content.innerHTML = '<p style="color:var(--accent2)">Connection error. Try again.</p>';
  }
  btn.disabled = false;
  btn.textContent = `Regenerate Cycle ${currentCycle} Recap`;
}

loadFromCloud();
</script>
